<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>搭子 · 韩团线下</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --black: #0a0a0a; --gray-7: #444; --gray-5: #888;
  --gray-3: #ccc; --gray-1: #f4f4f4; --white: #fafafa;
  --radius: 16px; --radius-sm: 10px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: #ddd; font-family: 'Noto Sans SC', sans-serif; font-weight: 300; -webkit-font-smoothing: antialiased; }
#app { max-width: 430px; margin: 0 auto; height: 100dvh; min-height: 100vh; display: flex; flex-direction: column; background: var(--white); overflow: hidden; box-shadow: 0 0 60px rgba(0,0,0,.15); }

/* TOP BAR */
.topbar { padding: 18px 22px 10px; display: flex; align-items: center; justify-content: space-between; background: var(--white); border-bottom: 1px solid var(--gray-1); flex-shrink: 0; z-index: 10; }
.logo { font-family: 'DM Sans', sans-serif; font-size: 19px; font-weight: 500; letter-spacing: -.5px; color: var(--black); }
.logo span { color: var(--gray-5); font-weight: 300; font-size: 15px; }
.icon-btn { width: 34px; height: 34px; border: 1.5px solid var(--gray-3); border-radius: 50%; display: flex; align-items: center; justify-content: center; background: none; cursor: pointer; font-size: 15px; transition: border-color .2s; }
.icon-btn:hover { border-color: var(--black); }

/* PAGES */
.pages { flex: 1; overflow: hidden; position: relative; }
.page { position: absolute; inset: 0; overflow-y: auto; padding-bottom: 90px; opacity: 0; pointer-events: none; transition: opacity .22s ease; scrollbar-width: none; }
.page::-webkit-scrollbar { display: none; }
.page.active { opacity: 1; pointer-events: all; }

/* BOTTOM NAV */
.bottom-nav { display: flex; flex-shrink: 0; background: rgba(250,250,250,.96); backdrop-filter: blur(20px); border-top: 1px solid var(--gray-3); z-index: 20; }
.nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 11px 0 14px; cursor: pointer; border: none; background: none; color: var(--gray-5); font-size: 10.5px; font-family: 'Noto Sans SC', sans-serif; font-weight: 300; letter-spacing: .3px; transition: color .2s; position: relative; }
.nav-item .ni { font-size: 20px; line-height: 1; }
.nav-item.active { color: var(--black); font-weight: 500; }
.nav-item.active::before { content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 22px; height: 2.5px; background: var(--black); border-radius: 0 0 3px 3px; }

/* DISCOVER */
.search-wrap { padding: 14px 22px 0; }
.search-box { display: flex; align-items: center; gap: 10px; border: 1.5px solid var(--gray-3); border-radius: 999px; padding: 10px 16px; transition: border-color .2s; }
.search-box:focus-within { border-color: var(--black); }
.search-box input { flex: 1; border: none; outline: none; background: none; font-size: 13.5px; font-family: 'Noto Sans SC', sans-serif; font-weight: 300; color: var(--black); }
.search-box input::placeholder { color: var(--gray-5); }
.s-icon { font-size: 15px; color: var(--gray-5); }
.filter-scroll { padding: 12px 22px 0; display: flex; gap: 7px; overflow-x: auto; scrollbar-width: none; }
.filter-scroll::-webkit-scrollbar { display: none; }
.fchip { flex-shrink: 0; border: 1.5px solid var(--gray-3); border-radius: 999px; padding: 6px 13px; font-size: 12px; font-family: 'Noto Sans SC', sans-serif; font-weight: 300; color: var(--gray-5); cursor: pointer; background: none; transition: all .15s; white-space: nowrap; }
.fchip.on, .fchip:hover { background: var(--black); border-color: var(--black); color: var(--white); }
.filter-drawer { margin: 0 22px; overflow: hidden; max-height: 0; transition: max-height .35s ease; }
.filter-drawer.open { max-height: 280px; }
.fd-inner { border: 1.5px solid var(--gray-3); border-radius: var(--radius); padding: 16px; margin-top: 12px; display: flex; flex-direction: column; gap: 12px; }
.fd-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.fd-field label { display: block; font-size: 11px; color: var(--gray-5); margin-bottom: 5px; }
.fd-field select, .fd-field input { width: 100%; border: 1.5px solid var(--gray-3); border-radius: var(--radius-sm); padding: 8px 11px; font-size: 13px; font-family: 'Noto Sans SC', sans-serif; font-weight: 300; color: var(--black); background: var(--white); appearance: none; outline: none; transition: border-color .2s; }
.fd-field select:focus, .fd-field input:focus { border-color: var(--black); }
.result-count { padding: 14px 22px 8px; font-size: 12px; color: var(--gray-5); }

/* CARDS */
.card-list { padding: 0 22px; display: flex; flex-direction: column; gap: 14px; }
.card { border: 1.5px solid var(--gray-3); border-radius: var(--radius); padding: 18px; cursor: pointer; transition: border-color .2s, box-shadow .2s; background: var(--white); }
.card:hover { border-color: var(--gray-7); box-shadow: 0 4px 20px rgba(0,0,0,.06); }
.card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
.card-location { font-size: 11.5px; color: var(--gray-5); }
.card-date { font-size: 11.5px; color: var(--gray-5); }
.card-event { font-size: 17px; font-weight: 500; letter-spacing: -.3px; line-height: 1.3; margin-bottom: 6px; }
.card-idol { font-size: 13px; color: var(--gray-5); margin-bottom: 11px; font-weight: 300; }
.tag-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 11px; }
.tag { font-size: 11.5px; padding: 4px 10px; border-radius: 999px; font-weight: 300; }
.tag-dark { background: var(--black); color: var(--white); }
.tag-light { background: var(--gray-1); color: var(--gray-7); }
.tag-outline { border: 1.5px solid var(--gray-3); color: var(--gray-5); }
.person-block { background: var(--gray-1); border-radius: var(--radius-sm); padding: 11px 13px; margin-bottom: 11px; }
.person-block-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.avatar-sm { width: 26px; height: 26px; border-radius: 50%; background: var(--gray-3); display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
.person-name { font-size: 12.5px; font-weight: 500; color: var(--black); }
.person-city { font-size: 11.5px; color: var(--gray-5); font-weight: 300; margin-left: auto; }
.person-desc { font-size: 12.5px; color: var(--gray-7); line-height: 1.65; font-weight: 300; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.card-footer { display: flex; align-items: center; justify-content: space-between; border-top: 1px solid var(--gray-1); padding-top: 11px; margin-top: 4px; }
.card-stats { display: flex; gap: 14px; }
.card-stat { font-size: 12px; color: var(--gray-5); }
.dm-btn { font-size: 12px; padding: 7px 15px; border: 1.5px solid var(--gray-3); border-radius: 999px; background: none; cursor: pointer; font-family: 'Noto Sans SC', sans-serif; font-weight: 400; color: var(--black); transition: all .2s; }
.dm-btn:hover { background: var(--black); color: var(--white); border-color: var(--black); }

/* PUBLISH */
.pub-inner { padding: 10px 22px 0; }
.page-title { font-size: 23px; font-weight: 500; letter-spacing: -.5px; margin-bottom: 4px; }
.page-sub { font-size: 13px; color: var(--gray-5); font-weight: 300; margin-bottom: 24px; line-height: 1.6; }
.form-group { margin-bottom: 18px; }
.form-label { display: block; font-size: 11.5px; color: var(--gray-5); margin-bottom: 6px; letter-spacing: .3px; }
.form-label .req { color: var(--black); }
.fi, .fs, .ft { width: 100%; border: 1.5px solid var(--gray-3); border-radius: var(--radius-sm); padding: 11px 13px; font-size: 13.5px; font-family: 'Noto Sans SC', sans-serif; font-weight: 300; color: var(--black); background: var(--white); appearance: none; outline: none; transition: border-color .2s; }
.fi::placeholder, .ft::placeholder { color: var(--gray-5); }
.fi:focus, .fs:focus, .ft:focus { border-color: var(--black); }
.ft { resize: none; min-height: 110px; line-height: 1.7; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 11px; }
.ms-wrap { display: flex; flex-wrap: wrap; gap: 7px; }
.ms-chip { padding: 7px 13px; border: 1.5px solid var(--gray-3); border-radius: 999px; font-size: 12.5px; font-family: 'Noto Sans SC', sans-serif; font-weight: 300; color: var(--gray-5); cursor: pointer; transition: all .15s; user-select: none; }
.ms-chip.sel { background: var(--black); border-color: var(--black); color: var(--white); }
.cb-row { display: flex; align-items: center; gap: 10px; font-size: 13.5px; color: var(--gray-7); font-weight: 300; cursor: pointer; }
.cb-row input[type=checkbox] { width: 17px; height: 17px; accent-color: var(--black); cursor: pointer; }
.submit-btn { width: 100%; padding: 14px; background: var(--black); color: var(--white); border: none; border-radius: var(--radius); font-size: 15px; font-family: 'Noto Sans SC', sans-serif; font-weight: 400; letter-spacing: .5px; cursor: pointer; margin-top: 8px; transition: opacity .2s; }
.submit-btn:hover { opacity: .78; }
.submit-btn:disabled { opacity: .4; cursor: not-allowed; }

/* 未登录发布 gate */
.login-gate { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 60vh; gap: 14px; text-align: center; padding: 0 36px; }
.login-gate .big { font-size: 44px; opacity: .18; }
.login-gate h3 { font-size: 17px; font-weight: 400; color: var(--gray-7); }
.login-gate p { font-size: 13px; color: var(--gray-5); line-height: 1.7; font-weight: 300; }
.go-btn { margin-top: 4px; padding: 11px 28px; background: var(--black); color: var(--white); border: none; border-radius: 999px; font-size: 13.5px; font-family: 'Noto Sans SC', sans-serif; font-weight: 400; cursor: pointer; transition: opacity .2s; }
.go-btn:hover { opacity: .75; }

/* 消息页 */
.dm-ph { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 65vh; gap: 14px; text-align: center; padding: 0 40px; }
.dm-ph .big { font-size: 50px; opacity: .2; }
.dm-ph h3 { font-size: 17px; font-weight: 400; color: var(--gray-7); }
.dm-ph p { font-size: 13px; color: var(--gray-5); line-height: 1.8; font-weight: 300; }

/* MY PAGE */
.profile-sec { padding: 20px 22px 24px; border-bottom: 1px solid var(--gray-1); }
.profile-avatar { width: 64px; height: 64px; border-radius: 50%; background: var(--gray-1); border: 1.5px solid var(--gray-3); display: flex; align-items: center; justify-content: center; font-size: 32px; margin-bottom: 14px; }
.profile-name { font-size: 20px; font-weight: 500; letter-spacing: -.3px; margin-bottom: 3px; }
.profile-idol { font-size: 13px; color: var(--gray-5); font-weight: 300; margin-bottom: 6px; }
.profile-bio { font-size: 13px; color: var(--gray-7); font-weight: 300; line-height: 1.6; margin-bottom: 14px; }
.profile-edit-btn { font-size: 12px; padding: 6px 16px; border: 1.5px solid var(--gray-3); border-radius: 999px; background: none; cursor: pointer; font-family: 'Noto Sans SC', sans-serif; font-weight: 300; color: var(--gray-7); transition: all .2s; }
.profile-edit-btn:hover { border-color: var(--black); color: var(--black); }
.sec-head { padding: 18px 22px 10px; font-size: 11.5px; font-weight: 500; letter-spacing: .5px; color: var(--gray-5); text-transform: uppercase; }
.my-posts { padding: 0 22px; display: flex; flex-direction: column; gap: 10px; }
.my-post { border: 1.5px solid var(--gray-3); border-radius: var(--radius-sm); padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.my-post-title { font-size: 14px; font-weight: 400; margin-bottom: 3px; }
.my-post-meta { font-size: 12px; color: var(--gray-5); font-weight: 300; }
.dot { width: 8px; height: 8px; border-radius: 50%; background: var(--gray-3); flex-shrink: 0; }
.dot.on { background: #5cb85c; }
.setting-item { padding: 14px 22px; border-bottom: 1px solid var(--gray-1); font-size: 14px; color: var(--gray-7); font-weight: 300; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
.setting-item .arr { color: var(--gray-3); }

/* AUTH */
.auth-section { padding: 24px 22px 0; }
.auth-tabs { display: flex; margin-bottom: 24px; border-bottom: 1.5px solid var(--gray-1); }
.auth-tab { flex: 1; text-align: center; padding: 10px 0; font-size: 14px; font-weight: 300; color: var(--gray-5); cursor: pointer; border: none; background: none; border-bottom: 2px solid transparent; margin-bottom: -1.5px; transition: all .2s; font-family: 'Noto Sans SC', sans-serif; }
.auth-tab.active { color: var(--black); font-weight: 500; border-bottom-color: var(--black); }
.auth-intro { font-size: 13px; color: var(--gray-5); font-weight: 300; line-height: 1.7; margin-bottom: 22px; }
.auth-btn { width: 100%; padding: 13px; background: var(--black); color: var(--white); border: none; border-radius: var(--radius); font-size: 14.5px; font-family: 'Noto Sans SC', sans-serif; font-weight: 400; letter-spacing: .3px; cursor: pointer; transition: opacity .2s; margin-top: 4px; }
.auth-btn:hover { opacity: .78; }
.auth-btn:disabled { opacity: .4; cursor: not-allowed; }
.auth-switch { text-align: center; margin-top: 16px; font-size: 12.5px; color: var(--gray-5); font-weight: 300; }
.auth-switch span { color: var(--black); cursor: pointer; font-weight: 400; }
.auth-switch span:hover { text-decoration: underline; }

/* EDIT MODAL */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.35); z-index: 100; display: flex; align-items: flex-end; justify-content: center; opacity: 0; pointer-events: none; transition: opacity .25s ease; }
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal-sheet { width: 100%; max-width: 430px; background: var(--white); border-radius: 20px 20px 0 0; padding: 0 0 32px; transform: translateY(40px); transition: transform .28s ease; max-height: 90dvh; overflow-y: auto; scrollbar-width: none; }
.modal-overlay.open .modal-sheet { transform: translateY(0); }
.modal-sheet::-webkit-scrollbar { display: none; }
.modal-handle { width: 36px; height: 4px; background: var(--gray-3); border-radius: 2px; margin: 14px auto 20px; }
.modal-title { font-size: 17px; font-weight: 500; letter-spacing: -.3px; padding: 0 22px; margin-bottom: 20px; }
.modal-body { padding: 0 22px; display: flex; flex-direction: column; gap: 16px; }
.avatar-picker { display: flex; gap: 12px; align-items: center; }
.avatar-preview { width: 56px; height: 56px; border-radius: 50%; background: var(--gray-1); border: 1.5px solid var(--gray-3); display: flex; align-items: center; justify-content: center; font-size: 28px; flex-shrink: 0; }
.avatar-emoji-grid { display: flex; flex-wrap: wrap; gap: 8px; }
.avatar-emoji { width: 36px; height: 36px; border-radius: 50%; background: var(--gray-1); border: 1.5px solid transparent; display: flex; align-items: center; justify-content: center; font-size: 18px; cursor: pointer; transition: border-color .15s; }
.avatar-emoji.picked { border-color: var(--black); }

/* TOAST */
.toast { position: fixed; bottom: 88px; left: 50%; transform: translateX(-50%) translateY(16px); background: var(--black); color: var(--white); padding: 11px 22px; border-radius: 999px; font-size: 13px; font-family: 'Noto Sans SC', sans-serif; font-weight: 300; opacity: 0; pointer-events: none; transition: all .28s ease; z-index: 999; white-space: nowrap; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <div class="logo">搭子<span> · kpop</span></div>
    <button class="icon-btn">🔔</button>
  </div>

  <div class="pages">

    <!-- ① 发现 -->
    <div class="page active" id="page-discover">
      <div class="search-wrap">
        <div class="search-box">
          <span class="s-icon">🔍</span>
          <input type="text" placeholder="搜索活动、城市、本命…" id="searchInput" oninput="window.filterCards()">
        </div>
      </div>
      <div class="filter-scroll">
        <button class="fchip on" id="drawerBtn" onclick="window.toggleDrawer()">筛选 ⌃</button>
        <button class="fchip type-chip on" data-type="" onclick="window.selectType(this)">全部</button>
        <button class="fchip type-chip" data-type="演唱会" onclick="window.selectType(this)">🎤 演唱会</button>
        <button class="fchip type-chip" data-type="见面会" onclick="window.selectType(this)">🤝 见面会</button>
        <button class="fchip type-chip" data-type="粉丝节" onclick="window.selectType(this)">🎉 粉丝节</button>
        <button class="fchip type-chip" data-type="机场接机" onclick="window.selectType(this)">✈️ 机场接机</button>
        <button class="fchip type-chip" data-type="周边活动" onclick="window.selectType(this)">🛍 周边活动</button>
      </div>
      <div class="filter-scroll" style="padding-top:6px;">
        <button class="fchip city-chip on" data-city="" onclick="window.selectCity(this)">🌏 全部地区</button>
        <button class="fchip city-chip" data-city="首尔" onclick="window.selectCity(this)">🇰🇷 首尔</button>
        <button class="fchip city-chip" data-city="釜山" onclick="window.selectCity(this)">🇰🇷 釜山</button>
        <button class="fchip city-chip" data-city="济州岛" onclick="window.selectCity(this)">🇰🇷 济州岛</button>
        <button class="fchip city-chip" data-city="东京" onclick="window.selectCity(this)">🇯🇵 东京</button>
        <button class="fchip city-chip" data-city="大阪" onclick="window.selectCity(this)">🇯🇵 大阪</button>
        <button class="fchip city-chip" data-city="曼谷" onclick="window.selectCity(this)">🇹🇭 曼谷</button>
        <button class="fchip city-chip" data-city="新加坡" onclick="window.selectCity(this)">🇸🇬 新加坡</button>
        <button class="fchip city-chip" data-city="台北" onclick="window.selectCity(this)">🇹🇼 台北</button>
        <button class="fchip city-chip" data-city="香港" onclick="window.selectCity(this)">🇭🇰 香港</button>
        <button class="fchip city-chip" data-city="澳门" onclick="window.selectCity(this)">🇲🇴 澳门</button>
        <button class="fchip city-chip" data-city="吉隆坡" onclick="window.selectCity(this)">🇲🇾 吉隆坡</button>
        <button class="fchip city-chip" data-city="雅加达" onclick="window.selectCity(this)">🇮🇩 雅加达</button>
        <button class="fchip city-chip" data-city="马尼拉" onclick="window.selectCity(this)">🇵🇭 马尼拉</button>
      </div>
      <div class="filter-drawer open" id="filterDrawer">
        <div class="fd-inner">
          <div class="fd-field">
            <label>地区（自定义搜索）</label>
            <input type="text" id="f-city" placeholder="输入城市或国家，如：首尔、曼谷…" oninput="window.onCityInput()">
          </div>
          <div class="fd-row">
            <div class="fd-field">
              <label>性别要求</label>
              <select id="f-gender" onchange="window.filterCards()">
                <option value="">不限</option><option>仅女生</option><option>男女均可</option>
              </select>
            </div>
            <div class="fd-field">
              <label>预算上限 ¥</label>
              <input type="number" id="f-budget" placeholder="如 1000" oninput="window.filterCards()">
            </div>
          </div>
          <div class="fd-row">
            <div class="fd-field">
              <label>本命</label>
              <input type="text" id="f-idol" placeholder="如 IVE / aespa" oninput="window.filterCards()">
            </div>
            <div class="fd-field">
              <label>招募人数</label>
              <select id="f-num" onchange="window.filterCards()">
                <option value="">不限</option><option>1人</option><option>2人</option><option>3人以上</option>
              </select>
            </div>
          </div>
        </div>
      </div>
      <div class="result-count" id="resultCount">加载中…</div>
      <div class="card-list" id="cardList"></div>
    </div>

    <!-- ② 发布 -->
    <div class="page" id="page-publish">
      <div class="login-gate" id="publishGate">
        <div class="big">✏️</div>
        <h3>登录后才能发布</h3>
        <p>发布你的搭子需求<br>让全球粉丝找到你 🤍</p>
        <button class="go-btn" onclick="window.goToLogin()">去登录 →</button>
      </div>
      <div class="pub-inner" id="publishForm" style="display:none">
        <div class="page-title">发布搭子需求</div>
        <div class="page-sub">告诉大家你的行程，找到志同道合的伙伴 🤍</div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">地区 <span class="req">*</span></label>
            <input class="fi" id="pub-city" type="text" placeholder="如：首尔、曼谷、台北…">
          </div>
          <div class="form-group">
            <label class="form-label">日期</label>
            <input class="fi" id="pub-date" type="date">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">活动名称 <span class="req">*</span></label>
          <input class="fi" id="pub-event" type="text" placeholder="如：IVE World Tour 首尔场">
        </div>
        <div class="form-group">
          <label class="form-label">活动类型</label>
          <div class="ms-wrap" id="pub-type-chips">
            <span class="ms-chip" onclick="window.toggleChip(this)">🎤 演唱会</span>
            <span class="ms-chip" onclick="window.toggleChip(this)">🤝 见面会</span>
            <span class="ms-chip" onclick="window.toggleChip(this)">🎉 粉丝节</span>

let activeType = '', activeCity = '';
window.selectType = function(btn) {

function setLoading(on) {
  document.getElementById('cardList').style.opacity = on ? '.4' : '1';
  if (on) document.getElementById('resultCount').textContent = '加载中…';
}

// ── 加载帖子 ──
async function loadPosts() {
  setLoading(true);
  try {
    let query = sb.from('posts').select('*').order('created_at', { ascending: false });
    const cityQ     = (document.getElementById('f-city').value || activeCity).trim();
    const gender    = document.getElementById('f-gender').value;
    const idol      = document.getElementById('f-idol').value.trim();
    const num       = document.getElementById('f-num').value;
    const budgetMax = parseInt(document.getElementById('f-budget').value) || null;
    const q         = document.getElementById('searchInput').value.trim();
    if (activeType) query = query.eq('type', activeType);
    if (cityQ)      query = query.ilike('city', `%${cityQ}%`);
    if (gender)     query = query.eq('gender', gender);
    if (idol)       query = query.ilike('idol', `%${idol}%`);
    if (num)        query = query.eq('num', num);
    const { data, error } = await query;
    if (error) throw error;
    let posts = data || [];
    if (q) {
      const lq = q.toLowerCase();
      posts = posts.filter(p =>
        [p.city,p.event,p.idol,p.about,p.style,p.type].some(v => v&&v.toLowerCase().includes(lq))
      );
    }
    if (budgetMax) {
      posts = posts.filter(p => {
        const nums = (p.budget||'').match(/\d+/g);
        if (!nums) return true;
        return Math.max(...nums.map(Number)) <= budgetMax;
      });
    }
    renderCards(posts);
  } catch(e) {
    console.error(e); showToast('加载失败，请检查网络');
    document.getElementById('resultCount').textContent = '加载失败';
  } finally { setLoading(false); }
}

// ── 渲染卡片 ──
function renderCards(posts) {
  const list = document.getElementById('cardList');
  document.getElementById('resultCount').textContent = `共 ${posts.length} 条行程`;
  if (!posts.length) {
    list.innerHTML = '<div style="padding:40px 0;text-align:center;color:var(--gray-5);font-size:13px;font-weight:300;">暂无符合条件的行程～</div>';
    return;
  }
  list.innerHTML = posts.map(p => {
    const dateStr = p.date ? p.date.replace(/-/g,'.') : '';
    const tags    = Array.isArray(p.tags) ? p.tags : [];
    const av      = p.avatar_url || '🌸';
    return `
    <div class="card">
      <div class="card-top">
        <span class="card-location">📍 ${p.city||''}</span>
        <span class="card-date">${dateStr}</span>
      </div>
      <div class="card-event">${p.event||''}</div>
      ${p.idol?`<div class="card-idol">본명 · ${p.idol}</div>`:''}
      <div class="tag-row">
        ${p.gender?`<span class="tag tag-dark">${p.gender}</span>`:''}
        ${p.type?`<span class="tag tag-light">${p.type}</span>`:''}
        ${p.num?`<span class="tag tag-outline">找 ${p.num}</span>`:''}
        ${p.budget?`<span class="tag tag-outline">${p.budget}</span>`:''}
      </div>
      ${p.about?`
      <div class="person-block">
        <div class="person-block-header">
          <div class="avatar-sm">${av}</div>
          <span class="person-name">${p.author_name||'匿名搭子'}</span>
          <span class="person-city">${p.style||''}</span>
        </div>
        <div class="person-desc">${p.about}</div>
      </div>`:''}
      ${tags.length?`<div class="tag-row">${tags.map(t=>`<span class="tag tag-outline">${t}</span>`).join('')}</div>`:''}
      <div class="card-footer">
        <div class="card-stats">
          <div class="card-stat">👥 ${p.num||'–'}</div>
          <div class="card-stat">${dateStr}</div>
        </div>
        ${p.allow_message!==false
          ?`<button class="dm-btn" onclick="showToast('已发送消息请求 ✓')">消息</button>`
          :'<span style="font-size:12px;color:var(--gray-5)">不接受消息</span>'}
      </div>
    </div>`;
  }).join('');
}

// ── 发布 ──
window.submitPost = async function() {
  if (!currentUser) { showToast('请先登录'); return; }
  const city  = document.getElementById('pub-city').value.trim();
  const event = document.getElementById('pub-event').value.trim();
  const about = document.getElementById('pub-about').value.trim();
  const idol  = document.getElementById('pub-idol').value.trim();
  if (!city||!event||!about||!idol) { showToast('请填写必填项 *'); return; }
  const btn = document.getElementById('submitBtn');
  btn.textContent = '发布中…'; btn.disabled = true;
  const typeChips = [...document.querySelectorAll('#pub-type-chips .ms-chip.sel')].map(c=>c.textContent.trim());
  const tripTags  = [...document.querySelectorAll('#pub-trip-tags .ms-chip.sel')].map(c=>c.textContent.trim());
  // 实时拉取最新昵称和头像
  const { data: prof } = await sb.from('profiles').select('username,avatar_url').eq('id',currentUser.id).single();
  const payload = {
    city, event, about, idol,
    date:          document.getElementById('pub-date').value || null,
    type:          typeChips[0] || null,
    num:           document.getElementById('pub-num').value,
    gender:        document.getElementById('pub-gender').value,
    budget:        document.getElementById('pub-budget').value.trim() || null,
    style:         document.getElementById('pub-style').value.trim() || null,
    tags:          tripTags,
    description:   document.getElementById('pub-desc').value.trim() || null,
    allow_message: document.getElementById('pub-dm').checked,
    author_uid:    currentUser.id,
    author_name:   prof?.username  || null,
    avatar_url:    prof?.avatar_url || '🌸',
  };
  const { error } = await sb.from('posts').insert(payload);
  btn.textContent = '发布行程'; btn.disabled = false;
  if (error) { showToast('发布失败：'+(error.message||'请重试')); return; }
  ['pub-city','pub-date','pub-event','pub-budget','pub-idol','pub-style','pub-about','pub-desc'].forEach(id=>{
    document.getElementById(id).value='';
  });
  document.querySelectorAll('#page-publish .ms-chip.sel').forEach(c=>c.classList.remove('sel'));
  document.getElementById('pub-dm').checked = true;
  showToast('发布成功！已上线 ✓');
  const myBtn = document.querySelector('.nav-item:nth-child(4)');
  window.switchPage('my', myBtn);
};

async function renderMyPosts() {
  const container = document.getElementById('myPostsList');
  container.innerHTML = '<div style="padding:16px 0;text-align:center;color:var(--gray-5);font-size:13px;">加载中…</div>';
  const { data, error } = await sb.from('posts').select('*').eq('author_uid',currentUser.id).order('created_at',{ascending:false});
  if (error||!data?.length) {
    container.innerHTML = '<div style="padding:20px 0;text-align:center;color:var(--gray-5);font-size:13px;font-weight:300;">还没有发布过行程～</div>';
    return;
  }
  container.innerHTML = data.map(p=>`
    <div class="my-post">
      <div style="flex:1;min-width:0">
        <div class="my-post-title">${p.event||'未命名活动'}</div>
        <div class="my-post-meta">${p.date?p.date.replace(/-/g,'.'):''}${p.city?' · '+p.city:''} · 招募 ${p.num||'–'}</div>
        ${p.idol?`<div style="margin-top:5px;font-size:11.5px;color:var(--gray-5)">本命：${p.idol}</div>`:''}
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px;flex-shrink:0">
        <div class="dot on"></div>
        <button onclick="window.deletePost('${p.id}')" style="font-size:11px;color:var(--gray-5);background:none;border:none;cursor:pointer;padding:2px 0;">删除</button>
      </div>
    </div>
  `).join('');
}
window.deletePost = async function(id) {
  const { error } = await sb.from('posts').delete().eq('id',id).eq('author_uid',currentUser.id);
  if (error) { showToast('删除失败'); return; }
  showToast('已删除'); renderMyPosts();
};

// ── Auth 状态监听 ──
sb.auth.onAuthStateChange(async (_event, session) => {
  currentUser = session?.user || null;
  renderAuthState();
  renderPublishPage();
  if (currentUser && document.getElementById('page-my').classList.contains('active')) {
    await loadProfile();
    renderMyPosts();
  }
});

// ── 初始化 ──
(async () => {
  const { data: { session } } = await sb.auth.getSession();
  currentUser = session?.user || null;
  renderAuthState();
  renderPublishPage();
  loadPosts();
})();
</script>
</body>
